<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MarcelleContato</title>
    <style>
        textarea{resize: none;}
    </style>
</head>
<body>
<header>
    <h1>Contato - Marcelle Almeida Scofano</h1>
    <a href="paginaInicial.html">Voltar à Página Principal</a> <br>
    <a href="marcelleIndividual.html">Voltar à Página Individual de Marcelle</a>
</header>
<hr>
<main>
    <h1>
        Formulário:
    </h1>
    <form action="/enviar-dados" method="post" enctype="multipart/form-data">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="exemplo@gmail.com" required>
        <br>
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(21) 00000-0000" required>
        <br>
        <label for="mensagem">Mensagem:</label>
        <textarea type="text" id="mensagem" name="mensagem" placeholder="Deixe sua mensagem" rows="4" cols="40" required></textarea>

        <button type="submit">Enviar</button>
    </form>
    <video controls>
        <source src="ImagensVideos/MinhaCachorrinha.mp4" type="video/mp4">
    </video>
</main>
<hr>
<footer>
    <nav>
        <a href="https://github.com/Marcyscofanohdisjhf" target="_blank">Meu GitHub</a>
        <a href="https://www.instagram.com/celle_scofano/?next=%2F" target="_blank">Instagram</a>
    </nav>
</footer>
</body>
</html>
